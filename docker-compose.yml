services:
  ocr-api:
    build: .
    container_name: ocr-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      DB_PATH: /data/jobs.db
    volumes:
      - ocr-data:/data
    expose:
      - "8000"
    networks:
      - default

  ocr-worker:
    build: .
    container_name: ocr-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      DB_PATH: /data/jobs.db
      HF_HOME: /hf-cache
    command: ["python", "-m", "app.worker"]
    volumes:
      - ocr-data:/data
      - hf-cache:/hf-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - default

volumes:
  ocr-data:
  hf-cache:

networks:
  default:
    name: app_default
    external: true
